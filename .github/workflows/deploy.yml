name: Deploy to Streamlit Cloud

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run syntax check
        run: |
          python -m py_compile app.py
          echo "✓ Python syntax validation passed"

      - name: Verify imports
        run: |
          python -c "
          import streamlit
          import pandas
          import numpy
          import matplotlib
          import prophet
          import sklearn
          print('✓ All imports verified successfully')
          "

      - name: Run linting (flake8)
        continue-on-error: true
        run: |
          pip install flake8
          flake8 app.py --max-line-length=120 --ignore=E501,W503 || true

      - name: Verify project structure
        run: |
          test -f app.py && echo "✓ app.py found"
          test -f README.md && echo "✓ README.md found"
          test -f requirements.txt && echo "✓ requirements.txt found"
          test -f Dockerfile && echo "✓ Dockerfile found"

      - name: Build Docker image
        run: |
          docker build -t retailpulse:latest .
          echo "✓ Docker image built successfully"

      - name: Deployment Status
        run: |
          echo "✓ All checks passed - Ready for Streamlit Cloud deployment"
